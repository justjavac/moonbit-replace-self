codecov:
  notify:
    after_n_builds: 3

coverage:
  status:
    project:
      default:
        target: auto
      linux:
        target: auto
        flags:
          - linux
      macos:
        target: auto
        flags:
          - macos
      windows:
        target: auto
        flags:
          - windows
    patch:
      default:
        target: auto

comment:
  layout: "diff, flags, files"
  require_changes: false

flags:
  linux:
    paths:
      - src/
  macos:
    paths:
      - src/
  windows:
    paths:
      - src/

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flag: linux
            coverage_file: coverage-linux.xml
          - os: macos-latest
            flag: macos
            coverage_file: coverage-macos.xml
          - os: windows-latest
            flag: windows
            coverage_file: coverage-windows.xml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Set up MoonBit on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show MoonBit version
        run: moon version

      - name: Sync dependencies
        run: moon update

      - name: Check native target
        run: moon check --target native

      - name: Run native tests with coverage on Unix
        if: runner.os != 'Windows'
        run: |
          moon coverage clean
          moon test --target native --enable-coverage -v

      - name: Run stable native tests on Windows
        if: runner.os == 'Windows'
        run: |
          moon test src/replace_self_test.mbt --target native -v
          moon test src/replace_self_wbtest.mbt --target native -v

      - name: Collect Windows coverage from stable test targets
        if: runner.os == 'Windows'
        run: |
          moon coverage clean
          moon test src/replace_self_test.mbt --target native --enable-coverage -v
          moon test src/replace_self_wbtest.mbt --target native --enable-coverage -v

      - name: Generate coverage report
        if: runner.os != 'Windows'
        run: moon coverage analyze -p justjavac/replace_self -- -f cobertura -o _build/${{ matrix.coverage_file }}

      - name: Upload coverage to Codecov
        if: runner.os != 'Windows'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          disable_search: true
          files: _build/${{ matrix.coverage_file }}
          flags: ${{ matrix.flag }}
          name: ${{ matrix.flag }}

  verify:
    name: Verify Generated Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Sync dependencies
        run: moon update

      - name: Verify formatting and generated files
        shell: bash
        run: |
          moon fmt --check
          moon check --deny-warn --target native
          moon info --target native
          git diff --exit-code

      - name: Build
        shell: bash
        run: moon build --target native
